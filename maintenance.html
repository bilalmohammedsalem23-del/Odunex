<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التطوير - Odunex</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
        }
        
        .maintenance-wrapper {
            width: 100%;
            padding: 20px;
        }
        
        .maintenance-box {
            background: white;
            border-radius: 40px;
            padding: 60px;
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.8s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .maintenance-icon {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 70px;
            color: white;
            animation: spin 6s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .maintenance-box h1 {
            font-size: 48px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 700;
        }
        
        .maintenance-box h1 span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .maintenance-box p {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.7;
        }
        
        .maintenance-progress {
            width: 100%;
            height: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            margin: 35px 0;
            overflow: hidden;
        }
        
        .maintenance-bar {
            width: 70%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 5px;
            animation: progress 2s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% { width: 30%; }
            50% { width: 80%; }
            100% { width: 30%; }
        }
        
        .maintenance-features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px 0;
        }
        
        .feature-item {
            text-align: center;
        }
        
        .feature-item i {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .feature-item h4 {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }
        
        .feature-item p {
            font-size: 12px;
            color: #999;
            margin: 0;
        }
        
        .maintenance-contact {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        
        .maintenance-contact a {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            margin: 0 10px;
            transition: all 0.3s;
        }
        
        .maintenance-contact a:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .maintenance-contact a i {
            margin-left: 8px;
        }
        
        /* Admin access only - مخفي عن المستخدمين */
        .admin-preview {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 9999;
        }
        
        .admin-preview a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
        }
        
        .admin-preview a:hover {
            background: rgba(255,255,255,0.3);
        }
        
        /* للشاشات الصغيرة */
        @media (max-width: 768px) {
            .maintenance-box {
                padding: 40px 25px;
            }
            
            .maintenance-box h1 {
                font-size: 36px;
            }
            
            .maintenance-box p {
                font-size: 18px;
            }
            
            .maintenance-features {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .maintenance-contact a {
                display: block;
                margin: 10px 0;
            }
        }
        
        /* النسخة الإنجليزية */
        html[lang="en"] {
            direction: ltr;
        }
        
        html[lang="en"] .admin-preview {
            left: auto;
            right: 20px;
        }
        
        html[lang="en"] .maintenance-contact a i {
            margin-left: 0;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="maintenance-wrapper">
        <div class="maintenance-box">
            <div class="maintenance-icon">
                <i class="fas fa-cogs"></i>
            </div>
            
            <h1><span>Odunex</span> قريباً</h1>
            <p>نعمل حالياً على إضافة نظام النسخ التجريبية لـ<br> <strong>ERPNext</strong> و <strong>Odoo</strong></p>
            
            <div class="maintenance-progress">
                <div class="maintenance-bar"></div>
            </div>
            
            <div class="maintenance-features">
                <div class="feature-item">
                    <i class="fas fa-rocket"></i>
                    <h4>إطلاق قريب</h4>
                    <p>خلال أيام</p>
                </div>
                <div class="feature-item">
                    <i class="fas fa-mobile-alt"></i>
                    <h4>تجربة مجانية</h4>
                    <p>14 يوم</p>
                </div>
                <div class="feature-item">
                    <i class="fas fa-headset"></i>
                    <h4>دعم فني</h4>
                    <p>24/7</p>
                </div>
            </div>
            
            <div class="maintenance-contact">
                <a href="https://wa.me/9647883002797" target="_blank">
                    <i class="fab fa-whatsapp"></i>
                    واتساب للاستفسار
                </a>
                <a href="mailto:info@odunex.com">
                    <i class="fas fa-envelope"></i>
                    البريد الإلكتروني
                </a>
            </div>
        </div>
    </div>
    
    <!-- شريط المعاينة للمشرف فقط (يظهر لك أنت فقط) -->
    <div class="admin-preview">
        <i class="fas fa-tools"></i> وضع الصيانة نشط
        <a href="?bypass=admin123" onclick="localStorage.setItem('adminBypass', 'true');">معاينة الموقع</a>
        <a href="admin/index.html">لوحة التحكم</a>
    </div>
    
    <script>
        // التحقق من صلاحية المشرف
        const urlParams = new URLSearchParams(window.location.search);
        const bypass = urlParams.get('bypass');
        
        // إذا كان المشرف يريد معاينة الموقع
        if (bypass === 'admin123' || localStorage.getItem('adminBypass') === 'true') {
            // إخفاء صفحة الصيانة
            document.querySelector('.maintenance-wrapper').style.display = 'none';
            
            // السماح بالدخول للموقع
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
