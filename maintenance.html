<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري الصيانة - Odunex</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
        }
        
        .maintenance-wrapper {
            width: 100%;
            padding: 20px;
        }
        
        .maintenance-box {
            background: white;
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            max-width: 550px;
            margin: 0 auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.8s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .maintenance-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 60px;
            color: white;
            animation: spin 6s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .maintenance-box h1 {
            font-size: 42px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 700;
        }
        
        .maintenance-box h1 span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .maintenance-box p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.7;
        }
        
        .maintenance-progress {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            margin: 30px 0;
            overflow: hidden;
        }
        
        .maintenance-bar {
            width: 70%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            animation: progress 2s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% { width: 30%; }
            50% { width: 80%; }
            100% { width: 30%; }
        }
        
        .maintenance-contact {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .maintenance-contact a {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
            flex: 1;
            max-width: 180px;
        }
        
        .maintenance-contact a:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .maintenance-contact a i {
            margin-left: 8px;
        }
        
        @media (max-width: 600px) {
            .maintenance-box {
                padding: 35px 25px;
            }
            
            .maintenance-box h1 {
                font-size: 34px;
            }
            
            .maintenance-contact {
                flex-direction: column;
                align-items: center;
            }
            
            .maintenance-contact a {
                width: 100%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-wrapper">
        <div class="maintenance-box">
            <div class="maintenance-icon">
                <i class="fas fa-cogs"></i>
            </div>
            
            <h1><span>Odunex</span></h1>
            <p>الموقع تحت الصيانة حالياً<br>سنعود قريباً</p>
            
            <div class="maintenance-progress">
                <div class="maintenance-bar"></div>
            </div>
            
            <div class="maintenance-contact">
                <a href="https://wa.me/9647883002797" target="_blank">
                    <i class="fab fa-whatsapp"></i>
                    واتساب
                </a>
                <a href="mailto:info@odunex.com">
                    <i class="fas fa-envelope"></i>
                    بريد
                </a>
            </div>
        </div>
    </div>
</body>
</html>
