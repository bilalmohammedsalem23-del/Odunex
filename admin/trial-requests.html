<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trial Requests - Odunex Admin</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0; }
.container { max-width:900px; margin:50px auto; padding:20px; background:#fff; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
h2 { text-align:center; color:#2d2f6e; }
#requestsList { margin-top:20px; }
.request-card { background:#f9f9f9; padding:15px; margin-bottom:15px; border-radius:6px; border-left:5px solid #6c5ce7; }
.request-card .request-title { font-weight:bold; font-size:18px; margin-bottom:5px; }
.request-card p { margin:5px 0; }
button { padding:8px 12px; background:#6c5ce7; color:#fff; border:none; border-radius:4px; cursor:pointer; }
button:hover { background:#5a4bd1; }
</style>
</head>
<body>

<div class="container">
    <h2>Trial Requests</h2>
    <div id="requestsList">Loading...</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // تحميل الطلبات
  async function loadRequests() {
    const list = document.getElementById("requestsList");
    list.innerHTML = "Loading...";

    try {
      const snapshot = await db.collection("trial_requests")
        .orderBy("createdAt", "desc")
        .get();

      list.innerHTML = "";

      snapshot.forEach(doc => {
        const r = doc.data();
        list.innerHTML += `
          <div class="request-card">
            <div class="request-title">${r.fullName}</div>
            <p><b>Company:</b> ${r.companyName}</p>
            <p><b>Email:</b> ${r.email}</p>
            <p><b>Phone:</b> ${r.phone}</p>
            <p><b>System:</b> ${r.selectedSystem}</p>
            <p><b>Status:</b> ${r.adminApproved ? "Approved" : "Pending"}</p>
            <button onclick="approve('${doc.id}')">Approve</button>
          </div>
        `;
      });

    } catch(error) {
      list.innerHTML = "Error loading requests";
      console.error(error);
    }
  }

  // تحديث الحالة
  async function approve(id) {
    try {
      await db.collection("trial_requests").doc(id).update({ adminApproved: true });
      loadRequests();
    } catch(error) {
      alert("Error approving request: " + error);
      console.error(error);
    }
  }

  window.onload = loadRequests;
</script>

</body>
</html>
