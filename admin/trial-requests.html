<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trial Requests - Odunex Admin</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0; }
.container { max-width:900px; margin:50px auto; padding:20px; background:#fff; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
h2 { text-align:center; color:#2d2f6e; }
#requestsList { margin-top:20px; }
.request-card { background:#f9f9f9; padding:15px; margin-bottom:15px; border-radius:6px; border-left:5px solid #6c5ce7; }
.request-card .request-title { font-weight:bold; font-size:18px; margin-bottom:5px; }
.request-card p { margin:5px 0; }
button { padding:8px 12px; background:#6c5ce7; color:#fff; border:none; border-radius:4px; cursor:pointer; }
button:hover { background:#5a4bd1; }
</style>
</head>
<body>

<div class="container">
    <h2>Trial Requests</h2>
    <div id="requestsList">Loading...</div>
</div>

<!-- Firebase SDK v9+ -->
<script type="module">
  // Import Firebase modules
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-analytics.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

  // Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyCbaHb-x48AUNFnwifNgqcqjmSujcXpmZ0",
    authDomain: "odunex-project.firebaseapp.com",
    projectId: "odunex-project",
    storageBucket: "odunex-project.firebasestorage.app",
    messagingSenderId: "20189086682",
    appId: "1:20189086682:web:76574c7befec70c24df6e3",
    measurementId: "G-RREEW2EY4K"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);

  const list = document.getElementById("requestsList");

  // تحميل الطلبات
  async function loadRequests() {
    list.innerHTML = "Loading...";
    try {
      const q = query(collection(db, "trial_requests"), orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);
      list.innerHTML = "";

      snapshot.forEach(docSnap => {
        const r = docSnap.data();
        list.innerHTML += `
          <div class="request-card">
            <div class="request-title">${r.fullName}</div>
            <p><b>Company:</b> ${r.companyName}</p>
            <p><b>Email:</b> ${r.email}</p>
            <p><b>Phone:</b> ${r.phone}</p>
            <p><b>System:</b> ${r.selectedSystem}</p>
            <p><b>Status:</b> ${r.adminApproved ? "Approved" : "Pending"}</p>
            <button onclick="approve('${docSnap.id}')">Approve</button>
          </div>
        `;
      });

    } catch(error) {
      list.innerHTML = "Error loading requests";
      console.error(error);
    }
  }

  // الموافقة على الطلب
  async function approve(id) {
    try {
      const docRef = doc(db, "trial_requests", id);
      await updateDoc(docRef, { adminApproved: true });
      loadRequests();
    } catch(error) {
      alert("Error approving request: " + error);
      console.error(error);
    }
  }

  // اجعل approve متاحة عالمياً
  window.approve = approve;

  window.onload = loadRequests;

</script>

</body>
</html>
