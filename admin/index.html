<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odunex Admin</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

.sidebar{
width:220px;
height:100vh;
background:#6c5ce7;
position:fixed;
color:white;
}

.sidebar h2{
text-align:center;
padding:20px;
}

.sidebar button{
width:100%;
padding:15px;
border:none;
background:none;
color:white;
text-align:left;
cursor:pointer;
}

.sidebar button:hover{
background:#574bd1;
}

.content{
margin-left:220px;
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
}

button.action{
background:#6c5ce7;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Odunex</h2>

<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('pages')">Pages</button>
<button onclick="showSection('requests')">Trial Requests</button>

</div>

<div class="content">

<div id="dashboard" class="section">

<div class="card">
<h3>Admin Dashboard</h3>
<p>Welcome to Odunex control panel</p>
</div>

</div>


<div id="pages" class="section" style="display:none">

<div class="card">

<h3>Edit Home Page</h3>

<label>Title EN</label>
<input id="homeTitleEn">

<label>Title AR</label>
<input id="homeTitleAr">

<label>Description</label>
<textarea id="homeDesc"></textarea>

<button class="action" onclick="savePage()">Save Page</button>

</div>

</div>


<div id="requests" class="section" style="display:none">

<div class="card">

<h3>Trial Requests</h3>

<div id="requestsList"></div>

</div>

</div>

</div>


<script>

const firebaseConfig = {
  apiKey: "AIzaSyCbaHb-x48AUNFnwifNgqcqjmSujcXpmZ0",
  authDomain: "odunex-project.firebaseapp.com",
  projectId: "odunex-project",
  storageBucket: "odunex-project.firebasestorage.app",
  messagingSenderId: "20189086682",
  appId: "1:20189086682:web:76574c7befec70c24df6e3",
  measurementId: "G-RREEW2EY4K"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();


function showSection(section){

document.querySelectorAll('.section').forEach(el=>{
el.style.display="none"
})

document.getElementById(section).style.display="block"

}


function savePage(){

const titleEn=document.getElementById("homeTitleEn").value
const titleAr=document.getElementById("homeTitleAr").value
const desc=document.getElementById("homeDesc").value

db.collection("pages").doc("home").set({

title_en:titleEn,
title_ar:titleAr,
description:desc

})

alert("Page Updated")

}


function loadRequests(){

db.collection("trial_requests")
.orderBy("createdAt","desc")
.get()
.then(snapshot=>{

const container=document.getElementById("requestsList")

container.innerHTML=""

snapshot.forEach(doc=>{

const data=doc.data()

container.innerHTML+=`

<div class="card">

<b>${data.fullName}</b>

<p>${data.companyName}</p>

<p>${data.email}</p>

<p>${data.phone}</p>

<p>System: ${data.selectedSystem}</p>

<p>Approved: ${data.adminApproved}</p>

<button class="action" onclick="approve('${doc.id}')">Approve</button>

</div>

`

})

})

}


function approve(id){

db.collection("trial_requests").doc(id).update({

adminApproved:true

}).then(()=>{

loadRequests()

})

}


loadRequests()

</script>

</body>
</html>
