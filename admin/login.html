<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - OdoNex Admin</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --secondary: #10b981;
            --danger: #ef4444;
            --dark: #1f2937;
            --gray: #6b7280;
            --light: #f3f4f6;
            --white: #ffffff;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo img {
            width: 100px;
            height: 100px;
            margin-bottom: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.2);
        }

        .logo h2 {
            color: var(--primary);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .logo p {
            color: var(--gray);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }

        .form-group label i {
            color: var(--primary);
            margin-left: 5px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 16px;
            transition: color 0.3s;
        }

        .form-control {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: var(--white);
        }

        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .form-control:focus + i {
            color: var(--primary);
        }

        .password-toggle {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s;
            z-index: 10;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .btn-login {
            width: 100%;
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login i {
            font-size: 18px;
            transition: transform 0.3s;
        }

        .btn-login:hover i {
            transform: translateX(5px);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee2e2;
            color: var(--danger);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-right: 4px solid var(--danger);
            display: none;
        }

        .error-message i {
            font-size: 18px;
        }

        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            z-index: 9999;
            display: none;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--white);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 10000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-right: 4px solid var(--secondary);
        }

        .toast.error {
            border-right: 4px solid var(--danger);
        }

        .toast i {
            font-size: 20px;
        }

        .toast.success i {
            color: var(--secondary);
        }

        .toast.error i {
            color: var(--danger);
        }

        .footer-links {
            margin-top: 30px;
            text-align: center;
            color: var(--gray);
            font-size: 13px;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 40px 20px;
            }

            .logo img {
                width: 80px;
                height: 80px;
            }

            .logo h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-bar" id="loadingBar"></div>

    <div class="login-container">
        <div class="logo">
            <img src="../assets/images/odonex-logo.png.png" alt="OdoNex Logo">
            <h2>OdoNex Admin</h2>
            <p>تسجيل الدخول إلى لوحة التحكم</p>
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">خطأ في البريد الإلكتروني أو كلمة المرور</span>
        </div>

        <form onsubmit="event.preventDefault(); login()">
            <div class="form-group">
                <label>
                    <i class="fas fa-envelope"></i>
                    البريد الإلكتروني
                </label>
                <div class="input-group">
                    <input type="email" id="email" class="form-control" 
                           placeholder="admin@odonex.com" 
                           required
                           autocomplete="email">
                    <i class="fas fa-envelope"></i>
                </div>
            </div>

            <div class="form-group">
                <label>
                    <i class="fas fa-lock"></i>
                    كلمة المرور
                </label>
                <div class="input-group">
                    <input type="password" id="password" class="form-control" 
                           placeholder="********" 
                           required
                           autocomplete="current-password">
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-eye password-toggle" id="togglePassword" onclick="togglePasswordVisibility()"></i>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span>تسجيل الدخول</span>
                <i class="fas fa-arrow-left"></i>
            </button>
        </form>

        <div class="footer-links">
            <p>جميع الحقوق محفوظة &copy; 2026 OdoNex</p>
            <p style="margin-top: 5px;">
                <a href="../index.html">العودة للموقع</a>
            </p>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas" id="toastIcon"></i>
        <span id="toastMessage"></span>
    </div>

    <script>
        // ==============================================
        // إعدادات Firebase
        // ==============================================
        const firebaseConfig = {
            apiKey: "AIzaSyCbaHb-x48AUNFwifNqcqjmSujcXpmZ0",
            authDomain: "odunex-project.firebaseapp.com",
            projectId: "odunex-project",
            storageBucket: "odunex-project.firebasestorage.app",
            messagingSenderId: "20180968682",
            appId: "1:20180968682:web:76574c7befec70c24df6e3",
            measurementId: "G-RREEW2EY4K"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ==============================================
        // التحقق من حالة تسجيل الدخول
        // ==============================================
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        // ==============================================
        // دالة تسجيل الدخول
        // ==============================================
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loadingBar = document.getElementById('loadingBar');
            const errorDiv = document.getElementById('errorMessage');

            if (!email || !password) {
                showError('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }

            loadingBar.style.display = 'block';
            loginBtn.disabled = true;
            errorDiv.style.display = 'none';

            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                
                showToast('success', 'تم تسجيل الدخول بنجاح');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                console.error('Login error:', error);
                
                switch (error.code) {
                    case 'auth/user-not-found':
                    case 'auth/wrong-password':
                    case 'auth/invalid-email':
                        showError('البريد الإلكتروني أو كلمة المرور غير صحيحة');
                        break;
                    case 'auth/too-many-requests':
                        showError('تم حظر الحساب مؤقتاً. الرجاء المحاولة لاحقاً');
                        break;
                    default:
                        showError('حدث خطأ في تسجيل الدخول');
                }
            } finally {
                loadingBar.style.display = 'none';
                loginBtn.disabled = false;
            }
        }

        // ==============================================
        // إظهار رسالة خطأ
        // ==============================================
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.style.display = 'flex';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // ==============================================
        // إظهار/إخفاء كلمة المرور
        // ==============================================
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePassword');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // ==============================================
        // إظهار رسالة تنبيه
        // ==============================================
        function showToast(type, message) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const messageEl = document.getElementById('toastMessage');
            
            toast.className = `toast ${type}`;
            icon.className = `fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}`;
            messageEl.textContent = message;
            
            toast.style.display = 'flex';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
