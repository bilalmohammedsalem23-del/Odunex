<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odunex | Under Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.box{
background:white;
padding:60px;
border-radius:30px;
text-align:center;
max-width:600px;
box-shadow:0 30px 60px rgba(0,0,0,0.25);
}

.icon{
width:120px;
height:120px;
margin:auto;
margin-bottom:25px;
background:linear-gradient(135deg,#667eea,#764ba2);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:50px;
animation:spin 6s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

h1{
font-size:40px;
margin-bottom:10px;
}

h1 span{
background:linear-gradient(135deg,#667eea,#764ba2);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
color:#666;
font-size:18px;
margin-bottom:30px;
}

.progress{
height:10px;
background:#eee;
border-radius:5px;
overflow:hidden;
}

.bar{
height:100%;
background:linear-gradient(90deg,#667eea,#764ba2);
animation:progress 2s infinite;
}

@keyframes progress{
0%{width:30%}
50%{width:80%}
100%{width:30%}
}

.features{
margin-top:35px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.feature i{
font-size:28px;
color:#667eea;
margin-bottom:6px;
}

.feature h4{
font-size:15px;
}

.feature p{
font-size:12px;
margin:0;
color:#999;
}

@media(max-width:700px){
.features{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="box">

<div class="icon">
<i class="fas fa-cogs"></i>
</div>

<h1><span>Odunex</span></h1>

<p>Website is under maintenance and development</p>

<div class="progress">
<div class="bar"></div>
</div>

<div class="features">

<div class="feature">
<i class="fas fa-code"></i>
<h4>Development</h4>
<p>Performance</p>
</div>

<div class="feature">
<i class="fas fa-shield-alt"></i>
<h4>Updates</h4>
<p>New features</p>
</div>

<div class="feature">
<i class="fas fa-rocket"></i>
<h4>Coming</h4>
<p>Very soon</p>
</div>

</div>

</div>

</body>
</html>
