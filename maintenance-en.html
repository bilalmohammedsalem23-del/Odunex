<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Odunex | تحت الصيانة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#667eea,#764ba2);
padding: 20px;
}

.box{
background:white;
padding:40px 60px;
border-radius:30px;
text-align:center;
max-width:600px;
width: 100%;
box-shadow:0 30px 60px rgba(0,0,0,0.25);
}

.icon{
width:100px;
height:100px;
margin:auto;
margin-bottom:25px;
background:linear-gradient(135deg,#667eea,#764ba2);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:40px;
animation:spin 6s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

h1{
font-size:35px;
margin-bottom:10px;
}

h1 span{
background:linear-gradient(135deg,#667eea,#764ba2);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p.status-text{
color:#666;
font-size:18px;
margin-bottom:30px;
line-height: 1.6;
}

.progress{
height:8px;
background:#eee;
border-radius:5px;
overflow:hidden;
margin-bottom: 20px;
}

.bar{
height:100%;
background:linear-gradient(90deg,#667eea,#764ba2);
animation:progress 2s infinite;
}

@keyframes progress{
0%{width:10%}
50%{width:90%}
100%{width:10%}
}

.features{
margin-top:35px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.feature i{
font-size:24px;
color:#667eea;
margin-bottom:10px;
}

.feature h4{
font-size:14px;
color: #333;
}

.feature p{
font-size:11px;
margin:0;
color:#999;
}

@media(max-width:600px){
.features{
grid-template-columns:1fr;
}
.box{
padding: 30px;
}
}
</style>
</head>

<body>

<div class="box">

<div class="icon">
<i class="fas fa-tools"></i>
</div>

<h1><span>Odunex</span></h1>

<p class="status-text">
    الموقع حالياً تحت الصيانة والتطوير<br>
    <small style="font-size: 14px; color: #888;">Website is under maintenance and development</small>
</p>

<div class="progress">
<div class="bar"></div>
</div>

<div class="features">

<div class="feature">
<i class="fas fa-code"></i>
<h4>تطوير الأداء</h4>
<p>Performance</p>
</div>

<div class="feature">
<i class="fas fa-shield-alt"></i>
<h4>تحديثات أمنية</h4>
<p>Security Updates</p>
</div>

<div class="feature">
<i class="fas fa-rocket"></i>
<h4>سنعود قريباً</h4>
<p>Coming Soon</p>
</div>

</div>

</div>

</body>
</html>
