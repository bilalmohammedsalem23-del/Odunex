<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance - Odunex</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            direction: ltr;
        }
        
        .maintenance-wrapper {
            width: 100%;
            padding: 20px;
        }
        
        .maintenance-box {
            background: white;
            border-radius: 40px;
            padding: 60px;
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.8s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .maintenance-icon {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 70px;
            color: white;
            animation: spin 6s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .maintenance-box h1 {
            font-size: 48px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 700;
        }
        
        .maintenance-box h1 span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .maintenance-box p {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.7;
        }
        
        .maintenance-progress {
            width: 100%;
            height: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            margin: 35px 0;
            overflow: hidden;
        }
        
        .maintenance-bar {
            width: 70%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 5px;
            animation: progress 2s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% { width: 30%; }
            50% { width: 80%; }
            100% { width: 30%; }
        }
        
        .maintenance-features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px 0;
        }
        
        .feature-item {
            text-align: center;
        }
        
        .feature-item i {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .feature-item h4 {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }
        
        .feature-item p {
            font-size: 12px;
            color: #999;
            margin: 0;
        }
        
        @media (max-width: 768px) {
            .maintenance-box {
                padding: 40px 25px;
            }
            
            .maintenance-box h1 {
                font-size: 36px;
            }
            
            .maintenance-box p {
                font-size: 18px;
            }
            
            .maintenance-features {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-wrapper">
        <div class="maintenance-box">
            <div class="maintenance-icon">
                <i class="fas fa-cogs"></i>
            </div>
            
            <h1><span>Odunex</span></h1>
            <p>Website is under maintenance and development</p>
            
            <div class="maintenance-progress">
                <div class="maintenance-bar"></div>
            </div>
            
            <div class="maintenance-features">
                <div class="feature-item">
                    <i class="fas fa-code"></i>
                    <h4>Development</h4>
                    <p>Performance</p>
                </div>
                <div class="feature-item">
                    <i class="fas fa-shield-alt"></i>
                    <h4>Updates</h4>
                    <p>New features</p>
                </div>
                <div class="feature-item">
                    <i class="fas fa-rocket"></i>
                    <h4>Coming</h4>
                    <p>Very soon</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
