<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اتصل بنا</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google reCAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#f5f7fb;
  padding:40px;
}

.container{
  max-width:600px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input,textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:14px;
}

textarea{
  min-height:120px;
}

button{
  margin-top:20px;
  padding:12px;
  width:100%;
  background:#0066ff;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#004ecc;
}

.alert{
  margin-top:15px;
  padding:10px;
  border-radius:5px;
  display:none;
}

.success{background:#d4edda;}
.error{background:#f8d7da;}
.warning{background:#fff3cd;}
</style>

</head>

<body>

<div class="container">

<h2>اتصل بنا</h2>

<form id="contactForm">

<input type="text" id="name" placeholder="الاسم">
<input type="email" id="email" placeholder="البريد الإلكتروني">
<input type="text" id="subject" placeholder="الموضوع">
<textarea id="message" placeholder="رسالتك"></textarea>

<!-- Honeypot -->
<input type="text" id="website" style="display:none">

<br><br>

<div class="g-recaptcha" data-sitekey="6LfHpIssAAAAAI5yxIHZqJMD4zA-yNI9KOgpeUQo"></div>

<button type="submit">إرسال الرسالة</button>

<div id="alert" class="alert"></div>

</form>

</div>

<script>
// تهيئة EmailJS
(function(){
  emailjs.init("YOUR_EMAILJS_USER_ID"); // ضع معرف مستخدم EmailJS هنا
})();

function showAlert(msg,type){
  const alertBox=document.getElementById("alert");
  alertBox.className="alert "+type;
  alertBox.innerText=msg;
  alertBox.style.display="block";
}

function sanitize(text){
  return text.replace(/[<>]/g,"");
}

function validateEmail(email){
  const pattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!pattern.test(email)) return false;

  // حظر الايميلات المؤقتة والمشبوهة
  const blockedDomains=[
    "mailinator.com","tempmail.com","10minutemail.com",
    "yopmail.com","guerrillamail.com","throwawaymail.com",
    "fakeemail.com","trashmail.com","maildrop.cc"
  ];
  const domain=email.split("@")[1].toLowerCase();
  if(blockedDomains.includes(domain)) return false;

  return true;
}

function isSpam(text){
  const spamWords=["crypto","bitcoin","casino","loan","porn","sex"];
  text=text.toLowerCase();
  for(let word of spamWords){
    if(text.includes(word)){
      return true;
    }
  }
  return false;
}

async function sendEmail(name,email,subject,message){
  try{
    await emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
      from_name: name,
      from_email: email,
      subject: subject,
      message: message
    });
  }catch(e){
    console.error(e);
    throw new Error("خطأ في إرسال البريد الإلكتروني");
  }
}

document.getElementById("contactForm").addEventListener("submit",async function(e){
  e.preventDefault();

  const name=sanitize(document.getElementById("name").value.trim());
  const email=sanitize(document.getElementById("email").value.trim());
  const subject=sanitize(document.getElementById("subject").value.trim());
  const message=sanitize(document.getElementById("message").value.trim());
  const honeypot=document.getElementById("website").value;

  if(honeypot!==""){ return; } // روبوت

  if(!name||!email||!subject||!message){
    showAlert("يرجى ملء جميع الحقول","warning");
    return;
  }

  if(!validateEmail(email)){
    showAlert("البريد الإلكتروني غير صالح أو مؤقت","warning");
    return;
  }

  if(isSpam(name+subject+message)){
    showAlert("تم اكتشاف رسالة سبام","error");
    return;
  }

  const recaptcha=grecaptcha.getResponse();
  if(recaptcha.length===0){
    showAlert("يرجى التحقق أنك لست روبوت","warning");
    return;
  }

  const lastSend=localStorage.getItem("lastSend");
  const now=Date.now();
  if(lastSend && now-lastSend<30000){
    showAlert("يمكن إرسال رسالة كل 30 ثانية","warning");
    return;
  }
  localStorage.setItem("lastSend",now);

  try{
    await sendEmail(name,email,subject,message);
    showAlert("تم إرسال الرسالة بنجاح","success");
    document.getElementById("contactForm").reset();
    grecaptcha.reset();
  }catch(err){
    showAlert("حدث خطأ أثناء الإرسال","error");
  }

});
</script>

</body>
</html>
