<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Odunex - Dynamic Rotating Keywords</title>
    <style>
        /* Import Poppins font for consistency with original design */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0a1a 0%, #0a0a2a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            padding: 1rem;
        }

        /* Card styling - enhanced with subtle glow and depth */
        .card {
            --bg-color: #111;
            background-color: var(--bg-color);
            padding: 1rem 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(149, 106, 250, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(149, 106, 250, 0.4);
        }

        /* Loader container: "Odunex" static + animated words container */
        .loader {
            color: rgb(124, 124, 124);
            font-family: "Poppins", sans-serif;
            font-weight: 500;
            font-size: 25px;
            box-sizing: content-box;
            height: 40px;
            padding: 10px 10px;
            display: flex;
            align-items: center;
            border-radius: 8px;
            gap: 4px;
        }

        /* Static brand text "Odunex" with gradient and slight boldness */
        .brand-static {
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #c084fc 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            white-space: nowrap;
            text-shadow: 0 0 8px rgba(149, 106, 250, 0.3);
            margin-right: 4px;
        }

        /* Words wrapper: clipping container for vertical carousel */
        .words {
            overflow: hidden;
            position: relative;
            height: 40px;          /* fixed height matching line-height */
            line-height: 40px;
            display: inline-block;
            vertical-align: bottom;
            flex-shrink: 0;
            min-width: 140px;      /* ensures smooth width for longest word */
        }

        /* Gradient overlay to softly fade top/bottom edges */
        .words::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                var(--bg-color) 10%,
                transparent 30%,
                transparent 70%,
                var(--bg-color) 90%
            );
            z-index: 20;
            pointer-events: none;   /* allows clicking through if needed */
            border-radius: 4px;
        }

        /* Inner container for the animated list */
        .words-list {
            display: flex;
            flex-direction: column;
            animation: scrollWords 12s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
            will-change: transform;
        }

        /* Each word styling - vibrant purple matching original color scheme */
        .word {
            display: block;
            height: 40px;
            line-height: 40px;
            padding-left: 8px;
            padding-right: 4px;
            color: #956afa;
            font-weight: 600;
            white-space: nowrap;
            font-size: 25px;
            letter-spacing: -0.2px;
            text-shadow: 0 0 6px rgba(149, 106, 250, 0.4);
        }

        /* 
            KEYFRAMES: smooth vertical carousel that cycles through 18 words.
            Total words: 18. Each step moves -100% per word.
            We want a seamless loop: from 0% to -1700% (since 18 words = 1700% offset)
            To make the transition smooth and pause briefly at each word, we use keyframe steps.
            Duration: 12s total, each word gets ~0.66s visible, but with slight ease for fluid motion.
            However to replicate the original feel of "spin" but with many items, 
            we create an animation that translates Y stepwise.
            
            Original spin_4991 had keyframes with jumps. We'll create a modern stepped-but-smooth 
            scroll that cycles through all words and then resets seamlessly.
            
            Approach: Use percentage keyframes that translate Y from 0 to -(N-1)*100% 
            where N = number of words. Since we have 18 words, final offset = -1700%.
            We add an extra identical clone of the first word at the end to create infinite seamless loop? 
            Simpler: duplicate the first word at bottom of list, and animate to -(totalItems-1)*100%, 
            then reset without jump. But the HTML structure uses original words repeated? Better: 
            we use exact 18 unique words, and animation goes to -1700%, and then resets to 0% with 
            no jump by using infinite and the fact that after 100% it resets to 0, but that causes 
            a hard reset. To avoid abrupt jump, we duplicate first word at end in HTML, increase item count.
            For silky infinite loop: add first word again at bottom => 19 items, animation to -1800%,
            then resetting is seamless because identical word appears.
            This ensures the carousel looks continuous.
        */

        /* Build words array with 18 unique Arabic/tech words, plus a duplicate of first for smooth loop */
        /* We'll handle via HTML structure: inside .words-list we will have 19 spans (original 18 + clone of first) */
        
        /* Animation for 19 items: from 0% to -1800% (since each 100% per item) */
        @keyframes smoothWordScroll {
            0% {
                transform: translateY(0);
            }
            5% {
                transform: translateY(0);
            }
            10% {
                transform: translateY(-100%);
            }
            15% {
                transform: translateY(-100%);
            }
            20% {
                transform: translateY(-200%);
            }
            25% {
                transform: translateY(-200%);
            }
            30% {
                transform: translateY(-300%);
            }
            35% {
                transform: translateY(-300%);
            }
            40% {
                transform: translateY(-400%);
            }
            45% {
                transform: translateY(-400%);
            }
            50% {
                transform: translateY(-500%);
            }
            55% {
                transform: translateY(-500%);
            }
            60% {
                transform: translateY(-600%);
            }
            65% {
                transform: translateY(-600%);
            }
            70% {
                transform: translateY(-700%);
            }
            75% {
                transform: translateY(-700%);
            }
            80% {
                transform: translateY(-800%);
            }
            85% {
                transform: translateY(-800%);
            }
            90% {
                transform: translateY(-900%);
            }
            95% {
                transform: translateY(-900%);
            }
            100% {
                transform: translateY(-1000%);
            }
        }

        /* Since we have 19 items, we need full range up to -1800% (18 steps). 
           Redefine with better precision using dynamic keyframes? but we can use JS? 
           However better to generate precise keyframes for 19 items = 1800% offset.
           Let's create a more robust keyframe with steps using modern approach:
           We can set animation duration long enough and use steps? But client expects smooth like original.
           Better: use JavaScript to set keyframes? but for simplicity and reliability, I'll craft keyframes
           that cover all 19 positions. Because there are many words, we want each word to be visible for 
           a moment. The original spin_4991 had percentages like 10%,25% etc. For 19 words we can define
           distribution: each word gets about 5.26% of animation time. We'll create keyframes that 
           show each word for ~0.6s in a 12s animation. Let's do precise.
           
           Since writing 38 keyframes manually is messy, I'll use a more elegant solution:
           Use CSS custom properties and a script? but better to keep pure CSS.
           
           Alternative: Use JavaScript to inject style? but the requirement is pure HTML/CSS ideally.
           However the initial instruction is to modify given code. I can add a style with generated keyframes.
           But to maintain readability, I'll use a simpler approach: use steps(19) with transition? 
           But not smooth. 
           
           Better: use an infinite linear animation that moves Y at constant speed? No, we need discrete words.
           
           I'll implement a JS-free but CSS-only approach using 'animation-timing-function: steps(1)'? not smooth.
           
           Considering user experience: the original had smooth transitions between words. I'll create 
           smooth transitions between each word using cubic-bezier and defining keyframes for each word.
           
           Because there are 19 items, I will generate dynamic keyframes via style injection using 
           JavaScript to keep HTML/CSS clean but fulfill exact functionality. Since the problem asks 
           to change text content and style, I can include minimal JS to ensure perfect timing without 
           writing thousands of lines of CSS. However the output expects working interactive snippet.
           
           I'll produce clean solution: Use modern CSS with @keyframes and 19 steps using a precomputed
           keyframe set. Given the context, it's acceptable to use script to calculate keyframes for 
           precision. I'll generate robust keyframes that respect all words.
           
           I'll write a script that on load inserts dynamic keyframes based on word count.
           This ensures perfect loop and smoothness matching original aesthetics.
        */

        /* Fallback: base styles for words container */
        .words-list {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        /* responsive: on smaller screens, adjust font size slightly */
        @media (max-width: 550px) {
            .loader {
                font-size: 18px;
                height: 32px;
            }
            .words {
                height: 32px;
                line-height: 32px;
                min-width: 110px;
            }
            .word {
                height: 32px;
                line-height: 32px;
                font-size: 18px;
                padding-left: 6px;
            }
            .brand-static {
                font-size: 18px;
            }
        }

        /* subtle pulsing glow for brand name */
        @keyframes softGlow {
            0% { text-shadow: 0 0 2px rgba(149, 106, 250, 0.2); }
            100% { text-shadow: 0 0 10px rgba(149, 106, 250, 0.5); }
        }
        .brand-static {
            animation: softGlow 2s infinite alternate;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="loader">
        <span class="brand-static">Odunex</span>
        <div class="words">
            <div class="words-list" id="wordsList">
                <!-- Dynamic words will be populated by JS to ensure correct order and seamless loop -->
                <!-- But we will also keep static fallback; however use JS to construct proper list with clone -->
            </div>
        </div>
    </div>
</div>

<script>
    // Array of keywords in exact order as requested:
    // تكامل, مركزية, مرونة, قابلية_التوسع, أتمتة, شفافية, دقة, سرعة, موثوقية, تخصيص, تقارير, تحليلات, أمان, تتبع, تنظيم, كفاءة, توحيد, رقابة, إنتاجية
    // Note: user provided list:
    // تكامل
    // مركزية
    // مرونة
    // قابلية_التوسع
    // أتمتة
    // شفافية
    // دقة
    // سرعة
    // موثوقية
    // تخصيص
    // تقارير
    // تحليلات
    // أمان
    // تتبع
    // تنظيم
    // كفاءة
    // توحيد
    // رقابة
    // إنتاجية
    // That's 19 words! (I counted: 1 تكامل,2 مركزية,3 مرونة,4 قابلية_التوسع,5 أتمتة,6 شفافية,7 دقة,8 سرعة,9 موثوقية,10 تخصيص,11 تقارير,12 تحليلات,13 أمان,14 تتبع,15 تنظيم,16 كفاءة,17 توحيد,18 رقابة,19 إنتاجية)
    
    const wordsArray = [
        "تكامل",
        "مركزية",
        "مرونة",
        "قابلية_التوسع",
        "أتمتة",
        "شفافية",
        "دقة",
        "سرعة",
        "موثوقية",
        "تخصيص",
        "تقارير",
        "تحليلات",
        "أمان",
        "تتبع",
        "تنظيم",
        "كفاءة",
        "توحيد",
        "رقابة",
        "إنتاجية"
    ];
    
    // For seamless infinite loop, we duplicate the first word at the end.
    // So total items for animation = original length + 1 (clone of first)
    const itemsForAnimation = [...wordsArray, wordsArray[0]];
    
    // Populate the words-list div with spans
    const wordsListContainer = document.getElementById('wordsList');
    if (wordsListContainer) {
        wordsListContainer.innerHTML = '';
        itemsForAnimation.forEach(wordText => {
            const span = document.createElement('span');
            span.className = 'word';
            span.textContent = wordText;
            wordsListContainer.appendChild(span);
        });
    }
    
    // Number of items in the scrolling list (including clone)
    const totalItems = itemsForAnimation.length; // should be 20 (19+1)
    // Each item represents a 100% vertical translation (height)
    // Total translateY needed to show last item (the clone) is -(totalItems - 1) * 100%
    const maxOffset = (totalItems - 1) * 100; // e.g., 19 items -> 1900%
    
    // Generate dynamic keyframes for smooth stepwise animation similar to original spin_4991 style
    // We'll create keyframes that pause briefly at each word, then transition to next.
    // The original had smooth translation with holds at certain percentages.
    // We'll design: each word occupies equal duration (100% / (totalItems) but we have hold and move)
    // For better UX, each word stays visible for about 0.6s, transition 0.2s in 12s total.
    // Simpler: Use steps? but smoother: create keyframes with increments.
    // Since we need clean carousel, we can set keyframes based on equal distribution.
    // duration 14 seconds for better readability (12s feels fast for 19 words). Let's do 15s.
    // But original duration was 4s for 4 words. For 19 words we increase to 14s, maintaining readability.
    
    const animationDuration = 16; // seconds - comfortable to read each word
    const stepPercent = 100 / (totalItems - 1); // since we have (totalItems-1) transitions
    
    // Build keyframes rule string
    let keyframesRule = `@keyframes smoothWordScroll {\n`;
    // Add starting point
    keyframesRule += `  0% { transform: translateY(0); }\n`;
    
    for (let i = 1; i <= totalItems - 1; i++) {
        // The offset percentage where word i (0-index) is fully visible
        const startPercent = (i - 1) * stepPercent;
        const endPercent = i * stepPercent;
        const translateValue = -i * 100;
        
        // Hold at start of word position for a little (optional, but we'll set both start and end of transition)
        // To mimic original style: we create a slight hold at each word by setting same transform at start and end of segment
        // But simpler: we create smooth transition from previous offset to new offset between keyframes.
        // Since we want word to be stable before next move, we can add small hold. Let's produce typical carousel:
        // At each "stepPercent" we move to next, but we keep stable before.
        // Better: use two keyframes per step: one for end of hold and one for start of next.
        // To maintain simplicity and smoothness like original, we'll do:
        // From previous offset to new offset, with ease. No need extra hold, it's readable.
        // I'll define progressive keyframes at each stepPercent, transform reaches target.
        keyframesRule += `  ${endPercent}% { transform: translateY(-${i * 100}%); }\n`;
    }
    // Final frame ensure we end at full offset
    keyframesRule += `  100% { transform: translateY(-${maxOffset}%); }\n`;
    keyframesRule += `}`;
    
    // Inject style into head
    const styleElement = document.createElement('style');
    styleElement.textContent = keyframesRule;
    document.head.appendChild(styleElement);
    
    // Apply animation to .words-list with dynamic duration and easing similar to original spin_4991 ease
    const wordsList = document.querySelector('.words-list');
    if (wordsList) {
        wordsList.style.animation = `smoothWordScroll ${animationDuration}s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite`;
        // Add a small delay to ensure initial frame shows first word (تكامل)
        wordsList.style.animationFillMode = 'forwards';
    }
    
    // Additional enhancement: ensure the .words container has correct height and no overflow hidden issues
    // Also adjust min-width for longest word (قابلية_التوسع or إنتاجية) 
    const wordsWrapper = document.querySelector('.words');
    if (wordsWrapper) {
        // measure longest word to prevent clipping
        let maxWidth = 0;
        const tempSpan = document.createElement('span');
        tempSpan.className = 'word';
        tempSpan.style.visibility = 'hidden';
        tempSpan.style.position = 'absolute';
        tempSpan.style.whiteSpace = 'nowrap';
        document.body.appendChild(tempSpan);
        
        wordsArray.forEach(word => {
            tempSpan.textContent = word;
            const width = tempSpan.offsetWidth;
            if (width > maxWidth) maxWidth = width;
        });
        document.body.removeChild(tempSpan);
        if (maxWidth > 0) {
            wordsWrapper.style.minWidth = (maxWidth + 12) + 'px';
        } else {
            wordsWrapper.style.minWidth = '150px';
        }
    }
    
    // Also mirror original loader spacing to make "Odunex" + animated words look harmonious
    const loaderDiv = document.querySelector('.loader');
    if (loaderDiv) {
        loaderDiv.style.gap = '8px';
        loaderDiv.style.alignItems = 'center';
    }
    
    // For extra polish, ensure the brand-static has no line-height issues
    const brandSpan = document.querySelector('.brand-static');
    if (brandSpan) {
        brandSpan.style.lineHeight = '40px';
        brandSpan.style.display = 'inline-block';
    }
    
    // Adjust card responsiveness if needed
    // Also ensure gradient overlay does not block text selection but it's fine
    // Force hardware acceleration for smoother animation
    if (wordsList) {
        wordsList.style.transform = 'translateZ(0)';
        wordsList.style.backfaceVisibility = 'hidden';
    }
    
    // Optional: small tweak to match original's rounded corners perfectly
    const cardElem = document.querySelector('.card');
    if (cardElem) {
        cardElem.style.overflow = 'hidden';
    }
</script>

<!-- Explanation of changes:
     1. Replaced "loading" text with "Odunex" using a styled span with gradient.
     2. Replaced old word list (buttons, forms, switches, cards, buttons) with the provided 19 keywords:
        تكامل, مركزية, مرونة, قابلية_التوسع, أتمتة, شفافية, دقة, سرعة, موثوقية, تخصيص, تقارير, تحليلات, أمان, تتبع, تنظيم, كفاءة, توحيد, رقابة, إنتاجية.
     3. Used dynamic JavaScript to create seamless infinite vertical carousel with smooth transitions.
     4. Maintained original visual style (purple #956afa, Poppins font, gradient overlay, dark card background).
     5. Animation replicates original spin_4991 smooth stepwise movement but adapted for 19+1 items.
     6. Responsive design and subtle hover glow for enhanced UX.
-->
</body>
</html>
